name: release-please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release

  verify-versions:
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - name: Verify tag matches package.json and deno.json version
        run: |
          TAG="${TAG_NAME#v}"
          NPM_VER=$(node -p "require('./package.json').version")
          JSR_VER=$(deno eval 'console.log(JSON.parse(Deno.readTextFileSync("deno.json")).version)')
          if [ "$TAG" != "$NPM_VER" ]; then
            echo "::error::Release tag ($TAG) does not match package.json version ($NPM_VER)"
            exit 1
          fi
          if [ "$TAG" != "$JSR_VER" ]; then
            echo "::error::Release tag ($TAG) does not match deno.json version ($JSR_VER)"
            exit 1
          fi
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}

  publish-npm:
    needs: [release-please, verify-versions]
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }

      - run: deno task test
      - run: deno task build:npm

      - name: Publish to npm
        run: npm publish --access public --provenance

  publish-jsr:
    needs: [release-please, verify-versions]
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }

      - run: deno task test

      - name: Publish to JSR
        run: deno publish
