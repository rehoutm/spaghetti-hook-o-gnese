name: Release

on:
  release:
    types: [published]

jobs:
  verify-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - name: Verify tag matches package.json and deno.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          NPM_VER=$(node -p "require('./package.json').version")
          JSR_VER=$(deno eval 'console.log(JSON.parse(Deno.readTextFileSync("deno.json")).version)')
          if [ "$TAG" != "$NPM_VER" ]; then
            echo "::error::Release tag ($TAG) does not match package.json version ($NPM_VER)"
            exit 1
          fi
          if [ "$TAG" != "$JSR_VER" ]; then
            echo "::error::Release tag ($TAG) does not match deno.json version ($JSR_VER)"
            exit 1
          fi

  publish-npm:
    needs: verify-versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }

      - run: deno task test
      - run: deno task build:npm

      - name: Publish to npm
        run: npm publish --access public --provenance

  publish-jsr:
    needs: verify-versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }

      - run: deno task test

      - name: Publish to JSR
        run: deno publish
